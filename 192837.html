<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trans 7</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.11/shaka-player.compiled.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
    }

    .player-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
    }
</style>
</head>
<body>

<div class="player-container">
    <video
        id="video"
        controls
        autoplay
        playsinline>
    </video>
</div>

<script>
async function initPlayer() {
    shaka.polyfill.installAll();

    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    // Format KID:KEY
    const clearKey =
        'f3841ff1c16144f8ba1e303430a66b5a:31ac91d00bbb4437830528fb00e6be07';

    const [kid, key] = clearKey.split(':');

    player.configure({
        drm: {
            clearKeys: {
                [kid]: key
            }
        }
    });

    await player.load('https://cdnjktbpid01.transvision.co.id/riutx01-1b04ad969ab2fc0fb50d5cbfbceab1d4/dash/VFJBTlM3LW15/manifest.mpd');
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
