<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Player</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  /* PLAYER FULL SCREEN */
  .player {
    position: fixed;
    inset: 0;
    background: black;
    overflow: hidden;
  }

  /* IFRAME CENTER + RESPONSIVE TV STYLE */
  .player iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    /* 16:9 scaling */
    width: 100vw;
    height: 56.25vw;

    /* ensure full height coverage */
    min-width: 177.78vh;
    min-height: 100vh;

    border: none;
  }

  /* OPTIONAL: disable outline when focus */
  iframe:focus {
    outline: none;
  }
</style>
</head>

<body>

<div class="player">
  <iframe id="iframe" allowfullscreen></iframe>
</div>

<script>
  // ambil parameter ?url=
  const urlParams = new URLSearchParams(window.location.search);
  const srcParam = urlParams.get('url');

  const iframe = document.getElementById('iframe');

  if (srcParam) {
    iframe.src = srcParam;
  } else {
    // fallback kalau tidak ada url
    document.body.innerHTML = "<div style='color:white;text-align:center;padding-top:40vh'>No video URL</div>";
  }
</script>

</body>
</html>
