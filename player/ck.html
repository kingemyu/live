<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>Universal Player</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.13.5/controls.min.css">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

.video-container{
    width:100%;
    height:100%;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

#unmuteBtn{
    position:fixed;
    top:15px;
    right:15px;
    z-index:9999;

    background:rgba(0,0,0,.8);
    color:#fff;
    border:none;
    border-radius:999px;
    padding:10px 16px;

    font-size:14px;
    font-weight:600;
    cursor:pointer;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="video-container" data-shaka-player-container>
    <video
        id="video"
        autoplay
        muted
        controls
        playsinline
        data-shaka-player>
    </video>
</div>

<button id="unmuteBtn">🔊 Unmute</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.13.5/shaka-player.compiled.js"></script>

<script>
const query = new URLSearchParams(location.search);
const input = query.get("url");

if (!input) {
    document.body.innerHTML =
        "<h2 style='color:white;text-align:center'>Parameter url tidak ditemukan</h2>";
    throw new Error("Missing URL");
}

let manifestUrl = input;
let kid = null;
let key = null;

if (input.includes("!!")) {

    const parts = input.split("!!");

    manifestUrl = parts[0];

    if (parts[1].includes(":")) {
        const drm = parts[1].split(":");

        kid = drm[0].trim().toLowerCase();
        key = drm[1].trim().toLowerCase();
    }
}

const video = document.getElementById("video");
const unmuteBtn = document.getElementById("unmuteBtn");

function updateUnmuteButton() {
    if (video.muted || video.volume === 0) {
        unmuteBtn.classList.remove("hidden");
    } else {
        unmuteBtn.classList.add("hidden");
    }
}

unmuteBtn.addEventListener("click", async () => {
    try {
        video.muted = false;
        video.volume = 1;
        await video.play();
        updateUnmuteButton();
    } catch(e) {
        console.error(e);
    }
});

video.addEventListener("volumechange", updateUnmuteButton);

async function initPlayer() {

    shaka.polyfill.installAll();

    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser tidak mendukung Shaka Player");
        return;
    }

    const player = new shaka.Player(video);

    player.addEventListener("error", event => {
        console.error("Shaka Error:", event.detail);
    });

    if (kid && key) {

        const clearKeys = {};
        clearKeys[kid] = key;

        player.configure({
            drm: {
                clearKeys: clearKeys
            }
        });

        console.log("ClearKey Loaded");
        console.log("KID:", kid);
        console.log("KEY:", key);
    }

    try {

        await player.load(manifestUrl);

        console.log("Manifest Loaded:", manifestUrl);

        updateUnmuteButton();

    } catch (error) {

        console.error(error);

        document.body.insertAdjacentHTML(
            "beforeend",
            `<div style="
                position:fixed;
                left:0;
                right:0;
                bottom:0;
                background:#b00020;
                color:white;
                padding:10px;
                font-family:sans-serif;
                font-size:14px;
                z-index:99999;
            ">${error.message}</div>`
        );
    }
}

initPlayer();
</script>

</body>
</html>
