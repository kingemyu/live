.channel-btn{

    border-radius:5px;

.channel-btn:hover{

.channel-btn.active{

/* MOBILE */

async function destroyPlayers(){

    if(flvPlayer){
        flvPlayer.destroy();
        flvPlayer = null;
    }

    if(shakaPlayer){
        await shakaPlayer.destroy();
        shakaPlayer = null;
    }
}

async function loadStream(name, btn){

    document.querySelectorAll(".channel-btn")
    .forEach(el => el.classList.remove("active"));

    btn.classList.add("active");

    await destroyPlayers();

    const stream = streams[name];

    try{

        if(stream.type==="hls" || stream.type==="dash"){

            shakaPlayer = new shaka.Player(video);
            await shakaPlayer.load(stream.url);

        }

        else if(stream.type==="dash-clearkey"){

            shakaPlayer = new shaka.Player(video);

            shakaPlayer.configure({
                drm:{
                    clearKeys:stream.keys
                }
            });

            await shakaPlayer.load(stream.url);

        }

        else if(stream.type==="flv"){

            if(mpegts.isSupported()){

                flvPlayer = mpegts.createPlayer({
                    type:"flv",
                    url:stream.url
                });

                flvPlayer.attachMediaElement(video);
                flvPlayer.load();
                flvPlayer.play();
            }
        }

    }catch(error){

        console.error(error);

    }
}

document.addEventListener("DOMContentLoaded",()=>{

    if(!shaka.Player.isBrowserSupported()){
        alert("Browser tidak mendukung Shaka Player");
        return;
    }

    loadStream(
        "hls1",
        document.querySelector(".channel-btn")
    );
