<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>KING EMYU</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.11/shaka-player.compiled.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f7fb;
    font-family:Roboto,sans-serif;
    color:#111827;
}

.container{
    height:100%;
    width:100%;
    max-width:950px;
    margin:auto;
    padding:20px;
}

.player-box{
    width:100%;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
}

/* HEADER */

.header{
    padding:20px;
    border-bottom:1px solid #e5e7eb;
}

.title{
    font-size:22px;
    font-weight:700;
    text-align: center;
}

/* VIDEO AREA */

.video-area{
    width:100%;
    background:#fff;
}

/* VIDEO */

.video-wrapper{
    width:100%;
    height:73vh;
    margin:auto;
}

.video-wrapper video{
    width:100%;
    height:100%;
    background:#fff;
    display:block;
    object-fit:contain;
}

/* CHANNEL BUTTON */

.channel-list{
    width:100%;
    padding:10px;
    padding-left:20px;
    background:#fff;
    border-top:1px solid #e5e7eb;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.channel-btn{
    border:1px solid #d1d5db;
    background:#fff;
    color:#374151;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    transition:.2s;
}

.channel-btn:hover{
    background:#f3f4f6;
}

.channel-btn.active{
    background:#2563eb;
    color:#fff;
    border-color:#2563eb;
}

/* MOBILE */

@media(max-width:800px){

.video-wrapper{
    width:100%;
    height:60vh;
    margin:auto;
}

@media(max-width:600px){

.video-wrapper{
    width:100%;
    height:45vh;
    margin:auto;
}

</style>
</head>

<body>

<div class="container">

    <div class="player-box">

        <div class="header">
            <div class="title">sambil nunggu pertandingan bola, nonton yang lain dulu wak!</div>

        </div>

        <div class="video-area">

            <div class="video-wrapper">
                <video
                    id="video"
                    controls
                    autoplay
                    playsinline>
                </video>
            </div>

        </div>

        <div class="channel-list">

            <button
                class="channel-btn"
                onclick="loadStream('ch1',this)">
                Trans7
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch2',this)">
                Trans TV
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch3',this)">
                MOJI
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch4',this)">
                tvOne
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch5',this)">
                RTV
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch6',this)">
                NTV
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch7',this)">
                Metro
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch8',this)">
                RCTI
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch9',this)">
                MNCTV
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch10',this)">
                GTV
            </button>

            <button
                class="channel-btn"
                onclick="loadStream('ch11',this)">
                iNews
            </button>
            
            <button
                class="channel-btn"
                onclick="loadStream('ch12',this)">
                Kompas
            </button>

        </div>

    </div>

</div>

<script>

const video = document.getElementById("video");

let shakaPlayer = null;
let flvPlayer = null;

const streams = {

    ch1:{
        type:"hls",
        url:"https://video.detik.com/trans7/smil:trans7.smil/chunklist.m3u8"
    },

    ch2:{
        type:"hls",
        url:"https://video.detik.com/transtv/smil:transtv.smil/chunklist.m3u8"
    },

    ch3:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/h/h207/index.m3u8"
    },

    ch4:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/h/h40/index.m3u8"
    },

    ch5:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/h/h10/index.m3u8"
    },

    ch6:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/h/h37/index.m3u8"
    },

    ch7:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/h/h12/index.m3u8"
    },

    ch8:{
        type:"hls",
        url:"https://rctiplus.vercel.app/api?url=https://r-plus.sedotcw3.workers.dev/index.m3u8?id=rcti"
    },

    ch9:{
        type:"hls",
        url:"https://rctiplus.vercel.app/api?url=https://r-plus.sedotcw3.workers.dev/index.m3u8?id=mnctv"
    },

    ch10:{
        type:"hls",
        url:"https://rctiplus.vercel.app/api?url=https://r-plus.sedotcw3.workers.dev/index.m3u8?id=gtv"
    },

    ch11:{
        type:"hls",
        url:"https://rctiplus.vercel.app/api?url=https://r-plus.sedotcw3.workers.dev/index.m3u8?id=inews"
    },
    
    ch12:{
        type:"hls",
        url:"https://op-group1-swiftservehd-1.dens.tv/s/s104/index.m3u8"
    }

};

async function destroyPlayers(){

    if(flvPlayer){
        flvPlayer.destroy();
        flvPlayer = null;
    }

    if(shakaPlayer){
        await shakaPlayer.destroy();
        shakaPlayer = null;
    }
}

async function loadStream(name, btn){

    document.querySelectorAll(".channel-btn")
    .forEach(el => el.classList.remove("active"));

    btn.classList.add("active");

    await destroyPlayers();

    const stream = streams[name];

    try{

        if(stream.type==="hls" || stream.type==="dash"){

            shakaPlayer = new shaka.Player(video);
            await shakaPlayer.load(stream.url);

        }

        else if(stream.type==="dash-clearkey"){

            shakaPlayer = new shaka.Player(video);

            shakaPlayer.configure({
                drm:{
                    clearKeys:stream.keys
                }
            });

            await shakaPlayer.load(stream.url);

        }

        else if(stream.type==="flv"){

            if(mpegts.isSupported()){

                flvPlayer = mpegts.createPlayer({
                    type:"flv",
                    url:stream.url
                });

                flvPlayer.attachMediaElement(video);
                flvPlayer.load();
                flvPlayer.play();
            }
        }

    }catch(error){

        console.error(error);

    }
}

document.addEventListener("DOMContentLoaded",()=>{

    if(!shaka.Player.isBrowserSupported()){
        alert("Browser tidak mendukung Shaka Player");
        return;
    }

    loadStream(
        "hls1",
        document.querySelector(".channel-btn")
    );

});

</script>

</body>
</html>
